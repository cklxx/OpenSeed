<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenSeed{% block title_suffix %}{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff;
            --green: #3fb950; --yellow: #d29922; --red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
               background: var(--bg); color: var(--text); line-height: 1.6; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 0; }
        nav .container { display: flex; align-items: center; gap: 24px; }
        nav .logo { font-weight: 700; font-size: 18px; color: var(--text); }
        nav a.nav-link { color: var(--dim); font-size: 14px; }
        nav a.nav-link:hover { color: var(--text); }
        main { padding: 32px 0; }
        h1 { font-size: 24px; margin-bottom: 16px; }
        h2 { font-size: 18px; margin-bottom: 12px; color: var(--dim); }
        .card { background: var(--surface); border: 1px solid var(--border);
                border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .card:hover { border-color: var(--accent); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                 gap: 12px; margin-bottom: 24px; }
        .stat { background: var(--surface); border: 1px solid var(--border);
                border-radius: 8px; padding: 16px; text-align: center; }
        .stat .number { font-size: 32px; font-weight: 700; color: var(--accent); }
        .stat .label { font-size: 13px; color: var(--dim); margin-top: 4px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px;
                 font-size: 12px; font-weight: 600; }
        .badge-unread { background: #1f6feb33; color: var(--accent); }
        .badge-reading { background: #d2992233; color: var(--yellow); }
        .badge-read { background: #3fb95033; color: var(--green); }
        .badge-archived { background: #30363d; color: var(--dim); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--dim); font-size: 13px; font-weight: 600; text-transform: uppercase; }
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box input { flex: 1; background: var(--surface); border: 1px solid var(--border);
                            color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px; }
        .search-box button { background: var(--accent); color: #fff; border: none; padding: 8px 16px;
                             border-radius: 6px; cursor: pointer; font-size: 14px; }
        .tag { display: inline-block; background: #1f6feb22; color: var(--accent);
               padding: 1px 6px; border-radius: 4px; font-size: 12px; margin-right: 4px; }
        .graph-node { display: inline-block; background: var(--surface); border: 1px solid var(--border);
                      border-radius: 6px; padding: 8px 12px; margin: 4px; font-size: 13px; }
        .cluster-box { background: var(--surface); border: 1px solid var(--border);
                       border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .summary { white-space: pre-wrap; font-size: 14px; line-height: 1.7; color: var(--dim); }
        .digest-content { background: var(--surface); border: 1px solid var(--border);
                          border-radius: 8px; padding: 16px; white-space: pre-wrap;
                          font-size: 13px; color: var(--dim); margin-bottom: 16px; }
        .filters { display: flex; gap: 8px; margin-bottom: 16px; }
        .filters a { padding: 4px 12px; border-radius: 16px; font-size: 13px;
                     background: var(--surface); border: 1px solid var(--border); color: var(--dim); }
        .filters a.active, .filters a:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">OpenSeed</a>
            <a href="/papers" class="nav-link">Papers</a>
            <a href="/graph" class="nav-link">Graph</a>
            <a href="/digests" class="nav-link">Digests</a>
            <a href="/sessions" class="nav-link">Research</a>
        </div>
    </nav>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
